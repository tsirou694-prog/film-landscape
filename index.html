<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>135 FILM · 胶片拼图</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Noto+Serif+SC:wght@300;400;600&display=swap');
:root{--bg:#0e0e0e;--sb:#111;--bdr:#222;--bdr2:#3a3a3a;--amber:#c8882a;--amberL:#e0a040;--tx:#d8d0c0;--txd:#666;--txm:#444;--sf:#181818;--sf2:#1e1e1e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif SC',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{height:48px;background:#080808;border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.logo{font-family:'Special Elite',cursive;font-size:16px;color:var(--amber);letter-spacing:.06em}
.logo-sub{font-size:11px;color:var(--txd);letter-spacing:.18em}
.hmeta{margin-left:auto;font-size:11px;color:var(--txm)}
.main{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:272px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#2a2a2a}
.sbs{padding:14px 14px 0}.sbs:last-child{padding-bottom:14px}
.lbl{font-size:10px;color:var(--txd);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:8px}
.div{height:1px;background:var(--bdr);margin:14px 0 0}
/* Upload */
.upz{border:1px dashed #2e2e2e;border-radius:5px;padding:13px 10px;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:var(--sf)}
.upz:hover,.upz.dov{border-color:var(--amber);background:rgba(200,136,42,.06)}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.up-txt{font-size:11px;color:var(--txd);line-height:1.6}
.up-cnt{font-size:11px;color:var(--amber);margin-top:4px;font-weight:600;min-height:16px}
.up-err{font-size:11px;color:#e05050;min-height:15px;margin-top:3px}
/* Thumbnails */
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px}
.twrap{display:flex;flex-direction:column;gap:2px}
.thumb{aspect-ratio:3/2;border-radius:3px;overflow:hidden;position:relative;cursor:grab;border:1.5px solid transparent;transition:border-color .12s,opacity .12s}
.thumb:active{cursor:grabbing}
.thumb.dsrc{opacity:.3}
.thumb.dot{border-color:var(--amber)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.tdel{position:absolute;top:2px;right:2px;width:15px;height:15px;background:rgba(0,0,0,.75);border:none;border-radius:50%;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
.thumb:hover .tdel{opacity:1}
.croprow{display:flex;gap:2px}
.cbtn{flex:1;padding:2px 0;font-size:8px;background:var(--sf2);border:1px solid var(--bdr);border-radius:2px;color:var(--txd);cursor:pointer;transition:all .12s;text-align:center;font-family:inherit}
.cbtn:hover{border-color:var(--bdr2);color:var(--tx)}
.cbtn.act{background:rgba(200,136,42,.15);border-color:var(--amber);color:var(--amber)}
/* Mode toggle */
.mode-row{display:flex;gap:5px}
.mode-btn{flex:1;padding:8px 4px;border:1px solid var(--bdr);border-radius:5px;background:var(--sf);color:var(--tx);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1.35;text-align:center}
.mode-btn:hover{border-color:var(--bdr2)}
.mode-btn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.mn{display:block;font-weight:600;font-size:11px}
.ms{display:block;font-size:9px;color:var(--txd);margin-top:2px}
.mode-btn.act .ms{color:#a06820}
/* Output mode toggle (Film Roll vs Poster) */
.outmode-row{display:flex;gap:5px}
.outmode-btn{flex:1;padding:7px 4px;border:1px solid var(--bdr);border-radius:5px;background:var(--sf);color:var(--tx);font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;line-height:1.35}
.outmode-btn:hover{border-color:var(--bdr2)}
.outmode-btn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.omn{display:block;font-weight:600;font-size:11px}
.oms{display:block;font-size:9px;color:var(--txd);margin-top:2px}
.outmode-btn.act .oms{color:#a06820}
/* Leader style picker */
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.lopt{border:1.5px solid var(--bdr);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .15s;background:var(--sf)}
.lopt:hover{border-color:var(--bdr2)}
.lopt.act{border-color:var(--amber)}
.lopt canvas{display:block;width:100%;height:auto}
.lname{font-size:8px;color:var(--txd);text-align:center;padding:3px 2px;line-height:1.2;background:var(--sf)}
.lopt.act .lname{color:var(--amber)}
/* Preset */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pbtn{padding:7px 6px;border:1px solid var(--bdr);border-radius:4px;background:var(--sf);color:var(--tx);font-size:10px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;line-height:1.4}
.pbtn:hover{border-color:var(--bdr2)}
.pbtn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
.pn{display:block;font-weight:600;font-size:10px}
.ps{display:block;font-size:9px;color:var(--txd);margin-top:1px}
.pbtn.act .ps{color:#a06820}
/* Intensity */
.irow{display:flex;gap:4px}
.ibtn{flex:1;padding:6px 2px;border:1px solid var(--bdr);border-radius:3px;background:var(--sf);color:var(--txd);font-size:10px;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.ibtn:hover{border-color:var(--bdr2);color:var(--tx)}
.ibtn.act{border-color:var(--amber);background:rgba(200,136,42,.1);color:var(--amber)}
/* Slider */
.slrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txd)}
.slrow input{flex:1;accent-color:var(--amber);cursor:pointer}
.sval{min-width:18px;text-align:right;color:var(--tx);font-weight:600}
/* Toggle switch */
.trow{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txd)}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:#2a2a2a;border-radius:20px;transition:.2s}
.tslider::before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#666;border-radius:50%;transition:.2s}
.toggle input:checked+.tslider{background:rgba(200,136,42,.3)}
.toggle input:checked+.tslider::before{background:var(--amber);transform:translateX(16px)}
/* Text input */
.txin{width:100%;background:var(--sf);border:1px solid var(--bdr);border-radius:4px;color:var(--tx);padding:7px 9px;font-size:11px;font-family:'Special Elite',cursive;outline:none;transition:border-color .15s}
.txin:focus{border-color:#444}
/* Poster-specific inputs */
.poster-section{display:none}
.poster-section.visible{display:block}
.txin-sm{width:100%;background:var(--sf);border:1px solid var(--bdr);border-radius:4px;color:var(--tx);padding:6px 9px;font-size:11px;font-family:'Noto Serif SC',serif;outline:none;transition:border-color .15s;margin-bottom:6px}
.txin-sm:focus{border-color:#444}
.txin-sm:last-child{margin-bottom:0}
.txin-sm::placeholder{color:#444}
/* Buttons */
.btngrp{padding:14px;display:flex;flex-direction:column;gap:7px;margin-top:auto;border-top:1px solid var(--bdr)}
.genbtn{width:100%;padding:10px;background:var(--amber);border:none;border-radius:5px;color:#0e0e0e;font-size:13px;font-weight:700;cursor:pointer;font-family:'Special Elite',cursive;letter-spacing:.05em;transition:background .15s}
.genbtn:hover{background:var(--amberL)}
.genbtn:active{transform:scale(.98)}
.genbtn:disabled{background:#333;color:#666;cursor:not-allowed;transform:none}
.expbtn{width:100%;padding:8px;background:transparent;border:1px solid var(--amber);border-radius:5px;color:var(--amber);font-size:12px;cursor:pointer;font-family:'Special Elite',cursive;letter-spacing:.04em;transition:all .15s}
.expbtn:hover{background:rgba(200,136,42,.1)}
.expbtn:disabled{border-color:#333;color:#444;cursor:not-allowed}
/* Canvas area */
.ca{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto;background:#0a0a0a}
.ca::-webkit-scrollbar{width:5px;height:5px}.ca::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--txd);text-align:center;margin:auto}
.phi{font-size:44px;opacity:.2}
.pht{font-size:14px;color:#444}
.phs{font-size:12px;line-height:2;opacity:.6;max-width:300px}
#cv{display:block;max-width:100%;height:auto;box-shadow:0 6px 50px rgba(0,0,0,.7);border-radius:3px}
</style>
</head>
<body>
<header>
  <span class="logo">135 FILM</span>
  <span class="logo-sub">胶片拼图生成器</span>
  <span class="hmeta">单文件离线工具</span>
</header>
<div class="main">
<div class="sidebar">
  <!-- Upload -->
  <div class="sbs">
    <span class="lbl">上传照片 <span style="color:#555;font-size:9px;letter-spacing:0;text-transform:none">（8–36张）</span></span>
    <div class="upz" id="uz">
      <input type="file" id="fi" multiple accept="image/*">
      <div style="font-size:18px;margin-bottom:4px;opacity:.5">📷</div>
      <div class="up-txt">点击或拖拽上传<br>JPG · PNG · HEIC · WEBP</div>
      <div class="up-cnt" id="ucnt">0 / 36 张</div>
    </div>
    <div class="up-err" id="uerr"></div>
    <div class="tgrid" id="tg"></div>
  </div>
  <div class="div"></div>

  <!-- Output Mode: Film Roll vs Poster -->
  <div class="sbs" style="padding-top:14px">
    <span class="lbl">输出模式</span>
    <div class="outmode-row">
      <button class="outmode-btn act" data-om="filmroll" onclick="selOutMode(this)">
        <span class="omn">胶卷模式</span><span class="oms">含胶卷壳排版</span>
      </button>
      <button class="outmode-btn" data-om="poster" onclick="selOutMode(this)">
        <span class="omn">海报模式</span><span class="oms">白底满幅海报</span>
      </button>
    </div>
  </div>

  <!-- Film Roll only settings -->
  <div id="filmroll-settings">
    <!-- Mode -->
    <div class="sbs" style="padding-top:14px">
      <span class="lbl">版式</span>
      <div class="mode-row">
        <button class="mode-btn act" data-m="portrait" onclick="selMode(this)">
          <span class="mn">竖版</span><span class="ms">帧 2:3 竖向</span>
        </button>
        <button class="mode-btn" data-m="landscape" onclick="selMode(this)">
          <span class="mn">横版</span><span class="ms">帧 3:2 横向</span>
        </button>
      </div>
    </div>
    <!-- White border toggle -->
    <div class="sbs" style="padding-top:12px">
      <div class="trow">
        <span>复古白框</span>
        <label class="toggle"><input type="checkbox" id="wbToggle" checked><span class="tslider"></span></label>
      </div>
    </div>
    <div class="div"></div>
    <!-- Leader style -->
    <div class="sbs" style="padding-top:14px">
      <span class="lbl">胶卷头款式</span>
      <div class="lgrid" id="lgrid"></div>
    </div>
    <div class="div"></div>
  </div>

  <!-- Poster only settings -->
  <div id="poster-settings" class="poster-section">
    <div class="sbs" style="padding-top:14px">
      <span class="lbl">海报标题</span>
      <input class="txin" id="posterTitle" placeholder="LIFE WITH FILM" maxlength="32" style="font-family:'Special Elite',cursive;font-size:14px">
    </div>
    <div class="sbs" style="padding-top:12px">
      <span class="lbl">底部标签 <span style="color:#555;font-size:9px;letter-spacing:0;text-transform:none">（最多3条，可留空）</span></span>
      <input class="txin-sm" id="tag1" placeholder="🎞  Kodak Ultramax 400 · ISO 400" maxlength="40">
      <input class="txin-sm" id="tag2" placeholder="📷  相机型号" maxlength="40">
      <input class="txin-sm" id="tag3" placeholder="🖨  扫描仪型号" maxlength="40">
    </div>
    <div class="div"></div>
  </div>

  <!-- Shared settings -->
  <!-- Preset -->
  <div class="sbs" style="padding-top:14px">
    <span class="lbl">色调预设</span>
    <div class="pgrid">
      <button class="pbtn act" data-p="none" onclick="selPreset(this)"><span class="pn">原图</span><span class="ps">不加滤镜</span></button>
      <button class="pbtn" data-p="fuji200" onclick="selPreset(this)"><span class="pn">富士 C200</span><span class="ps">清新绿调</span></button>
      <button class="pbtn" data-p="kodak400" onclick="selPreset(this)"><span class="pn">柯达 400</span><span class="ps">暖黄复古</span></button>
      <button class="pbtn" data-p="fujiDisp" onclick="selPreset(this)"><span class="pn">富士一次性</span><span class="ps">冷青对比</span></button>
      <button class="pbtn" data-p="bw" onclick="selPreset(this)"><span class="pn">黑白</span><span class="ps">银盐质感</span></button>
    </div>
  </div>
  <!-- Intensity -->
  <div class="sbs" style="padding-top:12px" id="isec">
    <span class="lbl">滤镜浓度</span>
    <div class="irow">
      <button class="ibtn" data-v="20" onclick="selInt(this)">20%</button>
      <button class="ibtn" data-v="40" onclick="selInt(this)">40%</button>
      <button class="ibtn act" data-v="60" onclick="selInt(this)">60%</button>
      <button class="ibtn" data-v="80" onclick="selInt(this)">80%</button>
      <button class="ibtn" data-v="100" onclick="selInt(this)">100%</button>
    </div>
  </div>
  <div class="div"></div>
  <!-- Frames per row -->
  <div class="sbs" style="padding-top:14px">
    <span class="lbl">每行帧数</span>
    <div class="slrow">
      <span>3</span>
      <input type="range" min="3" max="7" value="5" step="1" id="fpsr" oninput="document.getElementById('fpsv').textContent=this.value">
      <span>7</span>
      <span class="sval" id="fpsv">5</span>
    </div>
  </div>
  <!-- Date (film roll mode only) -->
  <div class="sbs" style="padding-top:12px;padding-bottom:14px" id="dateSection">
    <span class="lbl">日期 / 备注</span>
    <input class="txin" id="datin" placeholder="2024  SUMMER" maxlength="24">
  </div>
  <!-- Action buttons -->
  <div class="btngrp">
    <button class="genbtn" id="genb" onclick="generate()" disabled>▶ 生成预览</button>
    <button class="expbtn" id="expb" onclick="exportPNG()" disabled>↓ 导出 PNG</button>
  </div>
</div><!-- /sidebar -->
<!-- Canvas -->
<div class="ca" id="ca">
  <div class="ph" id="ph">
    <div class="phi">🎞</div>
    <div class="pht">上传 8–36 张照片，点击生成</div>
    <div class="phs">胶卷模式：模拟整卷35mm胶片展开<br>海报模式：白底满幅海报，含标题与标签</div>
  </div>
  <canvas id="cv" style="display:none"></canvas>
</div>
</div><!-- /main -->
<script>
'use strict';
// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let photos = [];      // {raw:Image, canvas:OffscreenCanvas, name, crop}
let filmMode = 'portrait';  // 'portrait' | 'landscape'
let outputMode = 'filmroll'; // 'filmroll' | 'poster'
let preset = 'none';
let intensity = 60;
let leaderIdx = 0;
let dragSrc = null;
// ═══════════════════════════════
// CONSTANTS
// ═══════════════════════════════
const PRESETS = {
  none:     {filmBg:'#181818',holeBg:'#080808',r:null,   g:null,   b:null,   sat:1,   tint:null,                  grain:0 },
  fuji200:  {filmBg:'#181d18',holeBg:'#0a0a0a',r:[0,240],g:[0,255],b:[5,238],sat:1.05,tint:'rgba(10,30,10,0.1)', grain:14},
  kodak400: {filmBg:'#1c1a10',holeBg:'#0a0a08',r:[5,255],g:[0,243],b:[0,208],sat:1.1, tint:'rgba(40,20,0,0.1)',  grain:18},
  fujiDisp: {filmBg:'#0e1318',holeBg:'#060a0e',r:[0,228],g:[5,255],b:[12,255],sat:1.15,tint:'rgba(0,10,30,0.12)',grain:24},
  bw:       {filmBg:'#141414',holeBg:'#050505',r:null,   g:null,   b:null,   sat:0,   tint:null,                  grain:28},
};
// Layout constants (all in logical px; canvas rendered @2×)
const EDGE = 4, GAP = 3;
const PAD  = 22;
const WB   = 26;  // white border width
const ROW_GAP = 20; // vertical gap between film strips
// Portrait mode
const PORT = {
  frameW: 88, frameH: 132,  // 2:3
  perfH: 28,
  get stripH() { return this.frameH + this.perfH*2; },
  stripW(fps) { return EDGE*2 + GAP*(fps-1) + this.frameW*fps; },
  canW(fps) { return this.stripH * 0.60; },
  canH(fps) { return this.stripH; },
  leftPad(fps) {
    const cw = this.canW(fps);
    const overlap = cw * 0.15;
    return Math.ceil(cw - overlap) + 10;
  },
};
// Landscape mode
const LAND = {
  frameH: 90, frameW: 135,  // 3:2
  perfH: 24,
  get stripH() { return this.frameH + this.perfH*2; },
  stripW(fps) { return EDGE*2 + GAP*(fps-1) + this.frameW*fps; },
  get canW() { return this.stripH * 0.60; },
  leftPad() {
    const cw = this.canW;
    const overlap = cw * 0.15;
    return Math.ceil(cw - overlap) + 10;
  },
};
// ═══════════════════════════════
// UPLOAD / THUMB
// ═══════════════════════════════
const uz = document.getElementById('uz');
const fi = document.getElementById('fi');
fi.addEventListener('change', e => addFiles(e.target.files));
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dov'); });
uz.addEventListener('dragleave', () => uz.classList.remove('dov'));
uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dov'); addFiles(e.dataTransfer.files); });
function setErr(msg) { document.getElementById('uerr').textContent = msg; }
function addFiles(files) {
  setErr('');
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  let waiting = 0;
  arr.forEach(f => {
    if (photos.length + waiting >= 36) { setErr('最多36张，多余已忽略'); return; }
    waiting++;
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      photos.push({ raw: img, canvas: normalizeImg(img, 'mid'), name: f.name, crop: 'mid' });
      URL.revokeObjectURL(url);
      waiting--;
      renderThumbs();
    };
    img.onerror = () => { waiting--; URL.revokeObjectURL(url); };
    img.src = url;
  });
}
// Normalize: crop source image to target aspect ratio with anchor
function normalizeImg(src, crop, targetAsp) {
  if (targetAsp === undefined) {
    targetAsp = filmMode === 'portrait' ? (2/3) : (3/2);
  }
  const TW = filmMode === 'portrait' ? 400 : 600;
  const TH = Math.round(TW / targetAsp);
  const c = document.createElement('canvas');
  c.width = TW; c.height = TH;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, TW, TH);
  const sw = src.naturalWidth || src.width;
  const sh = src.naturalHeight || src.height;
  const sAsp = sw / sh;
  let srcX = 0, srcY = 0, srcW = sw, srcH = sh;
  if (sAsp > targetAsp) {
    srcW = sh * targetAsp;
    srcX = (sw - srcW) / 2;
  } else {
    srcH = sw / targetAsp;
    const spare = sh - srcH;
    srcY = crop === 'top' ? 0 : crop === 'bot' ? spare : spare / 2;
  }
  ctx.drawImage(src, srcX, srcY, srcW, srcH, 0, 0, TW, TH);
  return c;
}
function renderThumbs() {
  const grid = document.getElementById('tg');
  grid.innerHTML = '';
  const cnt = document.getElementById('ucnt');
  cnt.textContent = `${photos.length} / 36 张`;
  cnt.style.color = photos.length < 8 ? '#e05050' : photos.length === 36 ? '#e09020' : '#c8882a';
  document.getElementById('genb').disabled = photos.length < 8;
  photos.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'twrap';
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.draggable = true;
    thumb.dataset.i = i;
    const img = document.createElement('img');
    img.src = p.canvas.toDataURL('image/jpeg', 0.45);
    const del = document.createElement('button');
    del.className = 'tdel'; del.textContent = '×';
    del.onclick = e => { e.stopPropagation(); photos.splice(i,1); renderThumbs(); };
    thumb.addEventListener('dragstart', () => { dragSrc = i; thumb.classList.add('dsrc'); });
    thumb.addEventListener('dragend', () => { dragSrc = null; document.querySelectorAll('.thumb').forEach(t => t.classList.remove('dsrc','dot')); });

function rrect(ctx, x, y, w, h, r) {

  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);

function sketchy(ctx, x, y, w, h, fill, lineCol) {

function drawPerfs(ctx, x, y, sw, perfH, pr) {
  const hCount = Math.max(4, Math.round(sw / 20));

}

function tongue(x, y, w, h) {
  const ts  = x + w * 0.55;
  const nW  = w * 0.08;
  const hz  = Math.round(h * 0.22);
  const mY  = y + h/2;
  const tH  = h * 0.48;
  const t1  = mY - tH/2;
  const t2  = mY + tH/2;
  const tx  = ts + nW;
  const ty  = y + hz + 2;
  const tw  = x + w - tx;
  const th  = h - hz*2 - 4;
  return { ts, nW, hz, t1, t2, tx, ty, tw, th };
}
function clipTongue(ctx, x, y, w, h) {
  const { ts, nW, hz, t1, t2 } = tongue(x, y, w, h);
  const ty = y + hz + 2, bH = h - hz*2 - 4;

  ctx.moveTo(ts, t1); ctx.lineTo(ts+nW, t1);
  ctx.lineTo(ts+nW, ty); ctx.lineTo(x+w, ty);
  ctx.lineTo(x+w, ty+bH); ctx.lineTo(ts+nW, ty+bH);
  ctx.lineTo(ts+nW, t2); ctx.lineTo(ts, t2);
  ctx.closePath();
}

function sketchStroke(ctx,x,y,w,h,r,col,lw){
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round';
  const j=()=>(Math.random()-0.5)*1.2;

  ctx.moveTo(x+r+j(),y+j()); ctx.lineTo(x+w-r+j(),y+j());
  ctx.quadraticCurveTo(x+w+j(),y+j(),x+w+j(),y+r+j());
  ctx.lineTo(x+w+j(),y+h-r+j());
  ctx.quadraticCurveTo(x+w+j(),y+h+j(),x+w-r+j(),y+h+j());
  ctx.lineTo(x+r+j(),y+h+j());
  ctx.quadraticCurveTo(x+j(),y+h+j(),x+j(),y+h-r+j());
  ctx.lineTo(x+j(),y+r+j());
  ctx.quadraticCurveTo(x+j(),y+j(),x+r+j(),y+j());
  ctx.closePath(); ctx.stroke(); ctx.restore();

// IMAGE PROCESSING
// ═══════════════════════════════
function applyLook(src, pr, intPct) {
  const w=src.width, h=src.height;
  const out=document.createElement('canvas'); out.width=w; out.height=h;
  const ctx=out.getContext('2d'); ctx.drawImage(src,0,0);
  if (preset==='none') return out;
  const ratio=intPct/100;
  const id=ctx.getImageData(0,0,w,h); const d=id.data;
  const isBW=pr.sat===0;
  const sat=1+(pr.sat-1)*ratio;
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    let pr2=r,pg=g,pb=b;
    if(isBW){
      const lum=0.299*r+0.587*g+0.114*b;
      pr2=lum+(lum>180?(lum-180)*0.025:0); pg=lum; pb=lum-(lum>180?(lum-180)*0.01:0);
    } else {
      if(pr.r){ pr2=pr.r[0]+(r/255)*(pr.r[1]-pr.r[0]); pg=pr.g[0]+(g/255)*(pr.g[1]-pr.g[0]); pb=pr.b[0]+(b/255)*(pr.b[1]-pr.b[0]); }
      if(sat!==1){ const gray=0.299*pr2+0.587*pg+0.114*pb; pr2=gray+sat*(pr2-gray); pg=gray+sat*(pg-gray); pb=gray+sat*(pb-gray); }
    }
    d[i]=Math.min(255,Math.max(0,Math.round(r+(pr2-r)*ratio)));
    d[i+1]=Math.min(255,Math.max(0,Math.round(g+(pg-g)*ratio)));
    d[i+2]=Math.min(255,Math.max(0,Math.round(b+(pb-b)*ratio)));
  }
  ctx.putImageData(id,0,0);
  if(pr.tint){ ctx.globalAlpha=ratio; ctx.fillStyle=pr.tint; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1; }
  const gr=Math.round((pr.grain||0)*ratio);
  if(gr>0){
    const gd=ctx.createImageData(w,h);
    for(let i=0;i<gd.data.length;i+=4){const v=(Math.random()-.5)*gr;gd.data[i]=128+v;gd.data[i+1]=128+v;gd.data[i+2]=128+v;gd.data[i+3]=16;}
    const gc=document.createElement('canvas');gc.width=w;gc.height=h;gc.getContext('2d').putImageData(gd,0,0);
    ctx.globalCompositeOperation='overlay';ctx.drawImage(gc,0,0);ctx.globalCompositeOperation='source-over';
  }
  return out;
}
// ═══════════════════════════════
// DRAW FILM STRIP ROW (shared by both modes)
// ═══════════════════════════════
function drawFilmStripRow(ctx, row, rows, rowPhotos, stripX, y, fps,
    STRIP_W, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, globalFrame) {
  const emptySlots = fps - rowPhotos.length;

  ctx.fillStyle = pr.filmBg;
  if (row === rows - 1 && emptySlots > 0) {
    const tongueWidth = emptySlots * (FRAME_W + GAP);
    const ts = stripX + STRIP_W - tongueWidth;
    const hz = PERF_H;
    const midTop = y + hz;
    const midBot = y + STRIP_H - hz;
    const notchW = tongueWidth * 0.1;
    const notchTop = midTop - (midBot - midTop) * 0.05;
    const notchBot = midBot + (midBot - midTop) * 0.05;
    const cornerRadius = 8;
    ctx.beginPath();
    ctx.moveTo(stripX, y);
    ctx.lineTo(ts, y);
    ctx.lineTo(ts, notchTop);
    ctx.lineTo(ts + notchW, notchTop);
    ctx.lineTo(ts + notchW, midTop);
    ctx.quadraticCurveTo(stripX + STRIP_W, midTop, stripX + STRIP_W, midTop + cornerRadius);
    ctx.lineTo(stripX + STRIP_W, midBot - cornerRadius);
    ctx.quadraticCurveTo(stripX + STRIP_W, midBot, stripX + STRIP_W - cornerRadius, midBot);
    ctx.lineTo(ts + notchW, midBot);
    ctx.lineTo(ts + notchW, notchBot);
    ctx.lineTo(ts, notchBot);
    ctx.lineTo(stripX, y + STRIP_H);
    ctx.lineTo(stripX, y);
    ctx.closePath();
    ctx.fill();
    const tailGrad = ctx.createLinearGradient(ts, 0, stripX + STRIP_W, 0);
    tailGrad.addColorStop(0, 'rgba(0,0,0,0)');
    tailGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.save();
    ctx.fillStyle = tailGrad;
    ctx.fillRect(ts, y, tongueWidth, STRIP_H);
    ctx.restore();
    drawPerfs(ctx, stripX, y, ts - stripX, PERF_H, pr);
    drawPerfs(ctx, stripX, y + STRIP_H - PERF_H, ts - stripX, PERF_H, pr);
  } else {
    ctx.fillRect(stripX, y, STRIP_W, STRIP_H);
    drawPerfs(ctx, stripX, y, STRIP_W, PERF_H, pr);
    drawPerfs(ctx, stripX, y + STRIP_H - PERF_H, STRIP_W, PERF_H, pr);
  }

  // Frames
  for (let f = 0; f < fps; f++) {
    const fx = stripX + EDGE + f * (FRAME_W + GAP);
    const fy = y + PERF_H;
    if (f < rowPhotos.length) {
      const processed = applyLook(rowPhotos[f].canvas, pr, intensity);
      ctx.save();
      ctx.beginPath(); ctx.rect(fx, fy, FRAME_W, FRAME_H); ctx.clip();
      ctx.drawImage(processed, fx, fy, FRAME_W, FRAME_H);
      ctx.restore();
    }
    if (f < rowPhotos.length) {
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.font = `bold ${Math.round(STRIP_H * 0.07)}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText((globalFrame + f + 1).toString(), fx + FRAME_W / 2, y + PERF_H - Math.round(PERF_H * 0.2));
    }
  }
  // Film brand text in top perf zone
  const ldrName = LEADERS[leaderIdx].name.replace('\n', ' ').toUpperCase();
  ctx.font = `${Math.round(PERF_H * 0.4)}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.textAlign = 'left';
  ctx.fillText(ldrName, stripX + EDGE, y + PERF_H * 0.55);
}

// GENERATE POSTER MODE
// ═══════════════════════════════
function generatePoster() {
  const n = photos.length;
  const pr = PRESETS[preset];
  const fps = parseInt(document.getElementById('fpsr').value);
  const titleText = document.getElementById('posterTitle').value.trim() || 'LIFE WITH FILM';
  const tags = [
    document.getElementById('tag1').value.trim(),
    document.getElementById('tag2').value.trim(),
    document.getElementById('tag3').value.trim(),
  ].filter(t => t.length > 0);

  // Poster always uses landscape frames to match the reference image layout
  // But respect the user's film mode setting for crop aspect ratio
  // We use portrait frames (3:2 landscape display) for a clean look
  // Actually let's use filmMode setting to respect user choice
  let PERF_H, FRAME_W, FRAME_H, STRIP_H, STRIP_W;
  if (filmMode === 'portrait') {
    PERF_H  = PORT.perfH;
    FRAME_W = PORT.frameW;
    FRAME_H = PORT.frameH;
    STRIP_H = PORT.stripH;
    STRIP_W = PORT.stripW(fps);
  } else {
    PERF_H  = LAND.perfH;
    FRAME_H = LAND.frameH;
    FRAME_W = LAND.frameW;
    STRIP_H = LAND.stripH;
    STRIP_W = LAND.stripW(fps);
  }

  const S = 2; // @2x
  const rows = Math.ceil(n / fps);

  // Poster layout constants
  const P_MARGIN = 40;         // outer white margin
  const P_TITLE_H = 80;        // title block height
  const P_COUNT_H = 32;        // photo count line height
  const P_ROW_GAP = 12;        // gap between film strips
  const P_TAG_H = tags.length > 0 ? 70 : 0;  // bottom tags area

  const contentW = STRIP_W;
  const fullW = contentW + P_MARGIN * 2;
  const stripsH = rows * STRIP_H + (rows - 1) * P_ROW_GAP;
  const fullH = P_MARGIN + P_TITLE_H + P_COUNT_H + stripsH + P_TAG_H + P_MARGIN;

  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width  = fullW * S;
  cv.height = fullH * S;
  cv.style.width  = fullW + 'px';
  cv.style.height = fullH + 'px';
  ctx.scale(S, S);

  // ── White background ──
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, fullW, fullH);

  // Subtle paper texture
  for (let i = 0; i < 1200; i++) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.012})`;
    ctx.fillRect(Math.random() * fullW, Math.random() * fullH, 1, 1);
  }

  let curY = P_MARGIN;

  // ── Title ──
  ctx.fillStyle = '#111111';
  ctx.font = `bold 42px 'Special Elite', monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(titleText.toUpperCase(), P_MARGIN, curY + 50);
  curY += P_TITLE_H;

  // ── Photo count row ──
  ctx.fillStyle = '#888';
  ctx.font = `14px 'Noto Serif SC', serif`;
  ctx.textAlign = 'left';
  // Small icon-ish square before count
  ctx.fillStyle = '#bbb';
  ctx.fillRect(P_MARGIN, curY + 4, 14, 14);
  ctx.fillStyle = '#888';
  ctx.fillText(`${n}`, P_MARGIN + 20, curY + 16);
  curY += P_COUNT_H;

  // ── Film strips ──
  const stripX = P_MARGIN;
  let globalFrame = 0;
  for (let row = 0; row < rows; row++) {
    if (row > 0) curY += P_ROW_GAP;
    const rowPhotos = photos.slice(row * fps, (row + 1) * fps);
    drawFilmStripRow(ctx, row, rows, rowPhotos, stripX, curY, fps,
      STRIP_W, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, globalFrame);
    globalFrame += rowPhotos.length;
    curY += STRIP_H;
  }

  // ── Bottom tags ──
  if (tags.length > 0) {
    curY += 24;
    const tagH = 36;
    const tagPadX = 14;
    const tagPadY = 10;
    const tagFontSize = 13;
    const tagGap = 10;
    const tagRadius = 4;

    ctx.font = `${tagFontSize}px 'Noto Serif SC', monospace`;
    let tagX = P_MARGIN;

    tags.forEach(tagText => {
      const textW = ctx.measureText(tagText).width;
      const tW = textW + tagPadX * 2;
      const tH = tagH;

      // Tag box
      ctx.fillStyle = '#111111';
      rrect(ctx, tagX, curY, tW, tH, tagRadius);
      ctx.fill();

      // Tag text
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'left';
      ctx.font = `${tagFontSize}px 'Noto Serif SC', monospace`;
      ctx.fillText(tagText, tagX + tagPadX, curY + tagPadY + tagFontSize);

      tagX += tW + tagGap;
    });
  }

  // Done
  document.getElementById('ph').style.display = 'none';
  cv.style.display = 'block';
  document.getElementById('expb').disabled = false;
}
// ═══════════════════════════════
// GENERATE (Film Roll mode)
// ═══════════════════════════════
function generateFilmRoll() {
  const n = photos.length;
  const pr   = PRESETS[preset];
  const fps  = parseInt(document.getElementById('fpsr').value);
  const dateStr = document.getElementById('datin').value.trim();
  const useWB = document.getElementById('wbToggle').checked;
  const S = 2;
  let STRIP_H, PERF_H, FRAME_W, FRAME_H, STRIP_W, LEFT_PAD;
  if (filmMode === 'portrait') {
    PERF_H  = PORT.perfH;
    FRAME_W = PORT.frameW;
    FRAME_H = PORT.frameH;
    STRIP_H = PORT.stripH;
    STRIP_W = PORT.stripW(fps);
    LEFT_PAD= PORT.leftPad(fps);
  } else {
    PERF_H  = LAND.perfH;
    FRAME_H = LAND.frameH;
    FRAME_W = LAND.frameW;
    STRIP_H = LAND.stripH;
    STRIP_W = LAND.stripW(fps);
    LEFT_PAD= LAND.leftPad();
  }
  const CAN_W = STRIP_H * 0.60;
  const CAN_OVERLAP = CAN_W * 0.15;
  const rows = Math.ceil(n / fps);
  let CW = LEFT_PAD + STRIP_W + PAD;
  let CH = PAD + (dateStr?20:8) + rows*STRIP_H + (rows-1)*ROW_GAP + ROW_GAP + PAD + 18;
  const wbOff = useWB ? WB : 0;
  const fullW = CW + wbOff*2;
  const fullH = CH + wbOff*2;
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  cv.width  = fullW*S;
  cv.height = fullH*S;
  cv.style.width  = fullW+'px';
  cv.style.height = fullH+'px';
  ctx.scale(S, S);
  if (useWB) {
    ctx.fillStyle = '#f8f5ee';
    ctx.fillRect(0, 0, fullW, fullH);
    const sGrad = ctx.createLinearGradient(0,0,0,fullH);
    sGrad.addColorStop(0,'rgba(0,0,0,0.06)');
    sGrad.addColorStop(0.08,'rgba(0,0,0,0)');
    sGrad.addColorStop(0.92,'rgba(0,0,0,0)');
    sGrad.addColorStop(1,'rgba(0,0,0,0.06)');
    ctx.fillStyle=sGrad; ctx.fillRect(0,0,fullW,fullH);
    const sGrad2 = ctx.createLinearGradient(0,0,fullW,0);
    sGrad2.addColorStop(0,'rgba(0,0,0,0.04)');
    sGrad2.addColorStop(0.06,'rgba(0,0,0,0)');
    sGrad2.addColorStop(0.94,'rgba(0,0,0,0)');
    sGrad2.addColorStop(1,'rgba(0,0,0,0.04)');
    ctx.fillStyle=sGrad2; ctx.fillRect(0,0,fullW,fullH);
    for(let i=0;i<800;i++){
      ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.018})`;
      ctx.fillRect(Math.random()*fullW,Math.random()*fullH,1,1);
    }
  }
  const ox = wbOff;
  const oy = wbOff;
  let contentY = oy + PAD;
  if (dateStr) {
    ctx.font='italic 11px Georgia,serif'; ctx.fillStyle='#aaa'; ctx.textAlign='left';
    ctx.fillText(dateStr, ox+LEFT_PAD, contentY+13);
    contentY += 20;
  } else {
    contentY += 8;
  }
  const stripX = ox + LEFT_PAD;
  let globalFrame = 0;
  for (let row=0; row<rows; row++) {
    if (row > 0) contentY += ROW_GAP;
    const rowPhotos = photos.slice(row*fps, (row+1)*fps);
    const y = contentY;
    drawFilmStripRow(ctx, row, rows, rowPhotos, stripX, y, fps,
      STRIP_W, STRIP_H, FRAME_W, FRAME_H, PERF_H, pr, globalFrame);
    // Canister on row 0
    if (row === 0) {
      const canX = stripX - CAN_W + CAN_OVERLAP;
      drawCanister(ctx, canX, y, CAN_W, CAN_W * (STRIP_H / (STRIP_H * 0.60)));
    }

  }
  contentY += ROW_GAP;
  const filmName=LEADERS[leaderIdx].name.replace('\n',' ');
  ctx.font='10px monospace'; ctx.fillStyle=useWB?'#aaa':'#888';
  ctx.textAlign='center';
  const labelStr = filmName + (dateStr?' · '+dateStr:'');
  ctx.fillText(labelStr, ox+LEFT_PAD+STRIP_W/2, contentY + 10);
  document.getElementById('ph').style.display='none';
  cv.style.display='block';
  document.getElementById('expb').disabled=false;
}
// ═══════════════════════════════
// GENERATE DISPATCHER
// ═══════════════════════════════
function generate() {
  const n = photos.length;
  if (n < 8)  { setErr('至少需要8张照片'); return; }
  if (n > 36) { setErr('最多36张'); return; }
  setErr('');
  if (outputMode === 'poster') {
    generatePoster();
  } else {
    generateFilmRoll();
  }
}
// ═══════════════════════════════
// EXPORT
// ═══════════════════════════════
function exportPNG() {
  const cv=document.getElementById('cv');
  if(cv.style.display==='none') return;
  const name = outputMode === 'poster'
    ? `film-poster-${Date.now()}.png`
    : `film-${filmMode}-${LEADERS[leaderIdx].name.replace(/\n/g,'-').replace(/\s+/g,'')}-${Date.now()}.png`;
  const a=document.createElement('a');
  a.download=name;
  a.href=cv.toDataURL('image/png'); a.click();
}
// ═══════════════════════════════
// INIT
// ═══════════════════════════════
initLeaderGrid();
renderThumbs();
</script>
</body>
